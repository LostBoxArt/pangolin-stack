name: pangolin
networks:
  default:
    driver: bridge
    name: pangolin
services:
  crowdsec:
    command: -t
    container_name: crowdsec
    environment:
      ACQUIRE_FILES: /var/log/traefik/*.log
      COLLECTIONS: crowdsecurity/traefik crowdsecurity/appsec-virtual-patching crowdsecurity/appsec-generic-rules
      ENROLL_INSTANCE_NAME: pangolin-crowdsec
      ENROLL_TAGS: docker
      GID: "1000"
      PARSERS: crowdsecurity/whitelists
      CUSTOM_HOSTNAME: "crowdsec"
      DISABLE_ONLINE_API: "${DISABLE_ONLINE_API}"
      DISABLE_HUB_UPDATE: "${DISABLE_HUB_UPDATE}"
    hostname: crowdsec
    expose:
      - 6060
    healthcheck:
      test:
        - CMD
        - cscli
        - lapi
        - status
    image: crowdsecurity/crowdsec:latest
    labels:
      - traefik.enable=false
      - com.centurylinklabs.watchtower.enable=false
    ports:
      - 6060:6060
    restart: unless-stopped
    volumes:
      - ./config/crowdsec:/etc/crowdsec
      - ./config/crowdsec/db:/var/lib/crowdsec/data
      - ./config/crowdsec_logs/auth.log:/var/log/auth.log:ro
      - ./config/crowdsec_logs/syslog:/var/log/syslog:ro
      - ./config/crowdsec_logs:/var/log
      - ./config/traefik/logs:/var/log/traefik
  gerbil:
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    command:
      - --reachableAt=http://gerbil:3003
      - --generateAndSaveKeyTo=/var/config/key
      - --remoteConfig=http://pangolin:3001/api/v1/gerbil/get-config
      - --reportBandwidthTo=http://pangolin:3001/api/v1/gerbil/receive-bandwidth
    container_name: gerbil
    depends_on:
      pangolin:
        condition: service_healthy
    image: fosrl/gerbil:1.3.0
    ports:
      - 51820:51820/udp
      - 443:443
      - 80:80
    restart: unless-stopped
    volumes:
      - ./config/:/var/config
    labels:
      - com.centurylinklabs.watchtower.enable=false
  pangolin:
    container_name: pangolin
    healthcheck:
      interval: 3s
      retries: 5
      test:
        - CMD
        - curl
        - -f
        - http://localhost:3001/api/v1/
      timeout: 3s
    image: fosrl/pangolin:1.13.1
    restart: unless-stopped
    volumes:
      - ./config:/app/config
    labels:
      - com.centurylinklabs.watchtower.enable=false
  traefik:
    command:
      - --configFile=/etc/traefik/traefik_config.yml
    container_name: traefik
    labels:
      - wud.watch=false
      - com.centurylinklabs.watchtower.enable=false
    depends_on:
      pangolin:
        condition: service_healthy
    image: traefik:latest
    network_mode: service:gerbil
    restart: unless-stopped
    volumes:
      - ./config/traefik:/etc/traefik:ro
      - ./config/letsencrypt:/letsencrypt
      - ./config/traefik/logs:/var/log/traefik
      - ./config/traefik/logs:/var/log/traefik
      - ./config/traefik/rules:/rules
      - /var/run/docker.sock:/var/run/docker.sock
  middleware-manager:
    image: hhftechnology/middleware-manager:latest
    container_name: middleware-manager
    restart: unless-stopped
    depends_on:
      pangolin:
        condition: service_healthy
    volumes:
      - ./data:/data
      - ./config/traefik/rules:/conf
      - ./config/traefik:/etc/traefik
      - ./config/middleware-manager/templates.yaml:/app/config/templates.yaml
      - ./config/middleware-manager/config.json:/app/config/config.json
    environment:
      - PANGOLIN_API_URL=http://pangolin:3001/api/v1
      - TRAEFIK_API_URL=http://gerbil:8080
      - TRAEFIK_CONF_DIR=/conf
      - TRAEFIK_STATIC_CONFIG_PATH=/etc/traefik/traefik_config.yml
      - DB_PATH=/data/middleware.db
      - PORT=3456
    ports:
      - "3456:3456"
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=3600
      - DOCKER_API_VERSION=1.44
      - WATCHTOWER_NOTIFICATIONS=shoutrrr
      - WATCHTOWER_NOTIFICATION_URL=${WATCHTOWER_NOTIFICATION_URL}
    restart: unless-stopped
  traefik-agent:
    image: hhftechnology/traefik-log-dashboard-agent:2.3.0
    container_name: traefik-agent
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./data/positions:/data
      - ./config/traefik/logs:/logs:ro
      - ./config/maxmind:/geoip:ro
    environment:
      - TRAEFIK_LOG_DASHBOARD_ACCESS_PATH=/logs/access.log
      - TRAEFIK_LOG_DASHBOARD_ERROR_PATH=/logs/traefik.log
      - TRAEFIK_LOG_DASHBOARD_AUTH_TOKEN=${TRAEFIK_DASHBOARD_TOKEN}
      - TRAEFIK_LOG_DASHBOARD_SYSTEM_MONITORING=true
      - TRAEFIK_LOG_DASHBOARD_GEOIP_ENABLED=true
      - TRAEFIK_LOG_DASHBOARD_GEOIP_CITY_DB=/geoip/GeoLite2-City.mmdb
      - TRAEFIK_LOG_DASHBOARD_GEOIP_COUNTRY_DB=/geoip/GeoLite2-Country.mmdb
      - TRAEFIK_LOG_DASHBOARD_LOG_FORMAT=json
      - PORT=5000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/logs/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
  traefik-dashboard:
    image: hhftechnology/traefik-log-dashboard:2.3.0
    container_name: traefik-dashboard
    restart: unless-stopped
    ports:
      - "3457:3000"
    volumes:
      - ./config/maxmind/GeoLite2-City.mmdb:/app/node_modules/geolite2-redist/dist/GeoLite2-City.mmdb:ro
      - ./config/maxmind/GeoLite2-Country.mmdb:/app/node_modules/geolite2-redist/dist/GeoLite2-Country.mmdb:ro
    environment:
      - AGENT_API_URL=http://traefik-agent:5000
      - AGENT_API_TOKEN=${TRAEFIK_DASHBOARD_TOKEN}
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      traefik-agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e 'require(\"http\").get(\"http://localhost:3000\", (res) => process.exit(res.statusCode === 200 ? 0 : 1))'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
  maxmind-updater:
    image: alpine:latest
    container_name: maxmind-updater
    restart: "no"
    volumes:
      - ./config/maxmind:/data
    environment:
      - MAXMIND_LICENSE_KEY=${MAXMIND_LICENSE_KEY}
    command: >
      sh -c "
        apk add --no-cache wget tar &&
        cd /data &&
        echo 'Downloading GeoLite2-City database...' &&
        wget -O GeoLite2-City.tar.gz 'https://download.maxmind.com/geoip/databases/GeoLite2-City/download?suffix=tar.gz' --user=${MAXMIND_ACCOUNT_ID} --password='${MAXMIND_LICENSE_KEY}' &&
        tar --wildcards -xzf GeoLite2-City.tar.gz --strip-components=1 '*/GeoLite2-City.mmdb' &&
        rm -f GeoLite2-City.tar.gz &&
        echo 'Downloading GeoLite2-Country database...' &&
        wget -O GeoLite2-Country.tar.gz 'https://download.maxmind.com/geoip/databases/GeoLite2-Country/download?suffix=tar.gz' --user=${MAXMIND_ACCOUNT_ID} --password='${MAXMIND_LICENSE_KEY}' &&
        tar --wildcards -xzf GeoLite2-Country.tar.gz --strip-components=1 '*/GeoLite2-Country.mmdb' &&
        rm -f GeoLite2-Country.tar.gz &&
        echo 'GeoIP databases downloaded successfully!' &&
        ls -la /data
      "
  pocket-id:
    image: ghcr.io/pocket-id/pocket-id:v1.16.0
    container_name: pocket-id
    restart: unless-stopped
    environment:
      - APP_URL=${POCKET_ID_APP_URL}
      - ENCRYPTION_KEY=${POCKET_ID_ENCRYPTION_KEY}
      - TRUST_PROXY=${POCKET_ID_TRUST_PROXY}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ./data:/app/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pocketid-redirect.rule=Host(`auth.example.com`)"
      - "traefik.http.routers.pocketid-redirect.entrypoints=web"
      - "traefik.http.routers.pocketid-redirect.middlewares=redirect-to-https@file"
      - "traefik.http.routers.pocketid.rule=Host(`auth.example.com`)"
      - "traefik.http.routers.pocketid.entrypoints=websecure"
      - "traefik.http.routers.pocketid.tls.certresolver=letsencrypt"
      - "traefik.http.routers.pocketid.middlewares=security-headers@file"
      - "traefik.http.services.pocketid.loadbalancer.server.port=1411"
    healthcheck:
      test: [ "CMD", "/app/pocket-id", "healthcheck" ]
      interval: 1m30s
      timeout: 5s
      retries: 2
      start_period: 10s
  portainer-agent:
    image: portainer/agent:latest
    container_name: portainer_agent
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    ports:
      - "9001:9001"
  portainer:
    image: portainer/portainer-ee:latest
    container_name: portainer
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    ports:
      - 9000:9000
      - 9443:9443
      - 8000:8000
    environment:
      - PORTAINER_LICENSE_KEY=${PORTAINER_LICENSE_KEY}

volumes:
  portainer_data:
    external: true
    name: portainer_data
