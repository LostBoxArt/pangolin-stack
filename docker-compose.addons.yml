# Pangolin Stack - Optional Add-ons
# Usage: docker compose -f docker-compose.yml -f docker-compose.addons.yml up -d

networks:
  default:
    name: pangolin
    external: true

services:
  #olm:
   # image: ghcr.io/fosrl/olm:1.3.0
   # container_name: olm
   # restart: unless-stopped
   # network_mode: host
   # cap_add:
   #   - NET_ADMIN
   # devices:
   #   - /dev/net/tun:/dev/net/tun
   # command:
   #   - "--id"
   #   - "zeo3s979u4jif3x"
   #   - "--secret"
   #   - "ax4okcnq7e6k6p1d2pxl7lhk7ajprkog3zfabac9anjst6ds"
   #   - "--endpoint"
   #   - "https://pangolin.example.com"

  dashdot:
    image: mauricenino/dashdot:latest
    container_name: dashdot
    restart: unless-stopped
    ports:
      - 3001:3001
    group_add:
      - "986"  # docker group
    environment:
      - DASHDOT_WIDGET_LIST=os,cpu,storage,ram,network
    volumes:
      - /:/mnt/host:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashdot.rule=Host(`dash.example.com`)"
      - "traefik.http.routers.dashdot.entrypoints=websecure"
      - "traefik.http.routers.dashdot.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dashdot.middlewares=security-headers@file"
      - "traefik.http.services.dashdot.loadbalancer.server.port=3001"

  linkstack:
    image: linkstackorg/linkstack:latest
    container_name: linkstack
    restart: unless-stopped
    group_add:
      - "986"  # docker group
    environment:
      - HTTP_SERVER_NAME=example.com
      - HTTPS_SERVER_NAME=example.com
      - LOG_LEVEL=info
      - PHP_MEMORY_LIMIT=256M
      - UPLOAD_MAX_FILESIZE=8M
      - TZ=Asia/Jerusalem
      - SERVER_ADMIN=admin@example.com
    volumes:
      - linkstack_data:/htdocs
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.linkstack.rule=Host(`example.com`)"
      - "traefik.http.routers.linkstack.entrypoints=websecure"
      - "traefik.http.routers.linkstack.tls.certresolver=letsencrypt"
      - "traefik.http.routers.linkstack.middlewares=security-headers@file"
      - "traefik.http.services.linkstack.loadbalancer.server.port=80"
      - "traefik.http.routers.linkstack-ip.rule=Host(`203.0.113.1`)"
      - "traefik.http.routers.linkstack-ip.entrypoints=websecure"
      - "traefik.http.routers.linkstack-ip.tls.certresolver=letsencrypt"
      - "traefik.http.routers.linkstack-ip.middlewares=security-headers@file"

  qbit-proxy:
    container_name: qbit-proxy
    build:
      context: ./qbit-proxy
    restart: unless-stopped
    environment:
      - TARGET_HOST=torrent.example.com
      - TARGET_IP=192.168.1.10

  homarr:
    container_name: homarr
    image: ghcr.io/homarr-labs/homarr:latest
    restart: unless-stopped
    depends_on:
      - qbit-proxy
    volumes:
      - /opt/homarr/appdata:/appdata
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - 7575:7575
    environment:
      - SECRET_ENCRYPTION_KEY=${HOMARR_SECRET_KEY}
      - TZ=Asia/Jerusalem
    extra_hosts:
      - "torrent.example.com:192.168.1.10"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homarr.rule=Host(`home.example.com`)"
      - "traefik.http.routers.homarr.entrypoints=websecure"
      - "traefik.http.routers.homarr.tls.certresolver=letsencrypt"
      - "traefik.http.routers.homarr.middlewares=security-headers@file"
      - "traefik.http.services.homarr.loadbalancer.server.port=7575"

  termix:
    image: ghcr.io/lukegus/termix:latest
    container_name: termix
    restart: unless-stopped
    volumes:
      - termix_data:/app/data
    environment:
      - PORT=8080
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.termix.rule=Host(`termix.example.com`)"
      - "traefik.http.routers.termix.entrypoints=websecure"
      - "traefik.http.routers.termix.tls.certresolver=letsencrypt"
      - "traefik.http.routers.termix.middlewares=security-headers@file"
      - "traefik.http.services.termix.loadbalancer.server.port=8080"

volumes:
  linkstack_data:
    external: true
    name: linkstack_linkstack_data

  termix_data:
    driver: local


