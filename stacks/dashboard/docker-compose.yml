# Pangolin Stack - Dashboard
# Requires: core stack (pangolin network)

name: pangolin-dashboard

networks:
  pangolin:
    external: true

services:
  qbit-proxy:
    container_name: qbit-proxy
    networks:
      - pangolin
    build:
      context: ../../qbit-proxy
    restart: unless-stopped
    environment:
      - TARGET_HOST=torrent.dennisb.xyz
      - TARGET_IP=192.168.0.10

  homarr:
    container_name: homarr
    image: ghcr.io/homarr-labs/homarr:latest
    networks:
      - pangolin
    restart: unless-stopped
    depends_on:
      - qbit-proxy
    volumes:
      - /opt/homarr/appdata:/appdata
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - 7575:7575
    environment:
      - SECRET_ENCRYPTION_KEY=${HOMARR_SECRET_KEY}
      - TZ=Asia/Jerusalem
    extra_hosts:
      - "torrent.dennisb.xyz:192.168.0.10"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homarr.rule=Host(`home.dennisb.xyz`)"
      - "traefik.http.routers.homarr.entrypoints=websecure"
      - "traefik.http.routers.homarr.tls.certresolver=letsencrypt"
      - "traefik.http.routers.homarr.middlewares=security-headers@file"
      - "traefik.http.services.homarr.loadbalancer.server.port=7575"
