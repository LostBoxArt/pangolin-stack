# Pangolin Stack - Security & Authentication
# Requires: core stack (pangolin network)

name: pangolin-security

networks:
  pangolin:
    external: true

services:
  crowdsec:
    command: -t
    container_name: crowdsec
    networks:
      - pangolin
    environment:
      ACQUIRE_FILES: /var/log/traefik/*.log
      COLLECTIONS: crowdsecurity/traefik crowdsecurity/appsec-virtual-patching crowdsecurity/appsec-generic-rules
      ENROLL_INSTANCE_NAME: pangolin-crowdsec
      ENROLL_TAGS: docker
      GID: "1000"
      PARSERS: crowdsecurity/whitelists
      CUSTOM_HOSTNAME: "crowdsec"
      DISABLE_ONLINE_API: "${DISABLE_ONLINE_API}"
      DISABLE_HUB_UPDATE: "${DISABLE_HUB_UPDATE}"
    hostname: crowdsec
    expose:
      - 6060
      - 8080
    healthcheck:
      test:
        - CMD
        - cscli
        - lapi
        - status
    image: crowdsecurity/crowdsec:latest
    labels:
      - traefik.enable=false
    ports:
      - 6060:6060
      - 8080:8080
    restart: unless-stopped
    volumes:
      - ../../config/crowdsec:/etc/crowdsec
      - ../../config/crowdsec/db:/var/lib/crowdsec/data
      - /var/log/auth.log:/var/log/auth.log:ro
      - /var/log/syslog:/var/log/syslog:ro
      - ../../config/traefik/logs:/var/log/traefik

  crowdsec-web-ui:
    image: ghcr.io/theduffman85/crowdsec-web-ui:latest
    container_name: crowdsec-web-ui
    networks:
      - pangolin
    restart: unless-stopped
    ports:
      - "3458:3000"
    depends_on:
      crowdsec:
        condition: service_healthy
    environment:
      CROWDSEC_URL: http://crowdsec:8080
      CROWDSEC_USER: crowdsec-web-ui
      CROWDSEC_PASSWORD: ${CROWDSEC_WEB_UI_PASSWORD}
      DB_DIR: /app/config
    volumes:
      - ../../config/crowdsec-web-ui:/app/config

  pocket-id:
    image: ghcr.io/pocket-id/pocket-id:v2
    container_name: pocket-id
    networks:
      - pangolin
    restart: unless-stopped
    environment:
      - APP_URL=${POCKET_ID_APP_URL}
      - ENCRYPTION_KEY=${POCKET_ID_ENCRYPTION_KEY}
      - TRUST_PROXY=${POCKET_ID_TRUST_PROXY}
      - MAXMIND_LICENSE_KEY=${MAXMIND_LICENSE_KEY}
      - MAXMIND_ACCOUNT_ID=${MAXMIND_ACCOUNT_ID}
    volumes:
      - ../../data:/app/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pocketid-redirect.rule=Host(`auth.dennisb.xyz`)"
      - "traefik.http.routers.pocketid-redirect.entrypoints=web"
      - "traefik.http.routers.pocketid-redirect.middlewares=redirect-to-https@file"
      - "traefik.http.routers.pocketid.rule=Host(`auth.dennisb.xyz`)"
      - "traefik.http.routers.pocketid.entrypoints=websecure"
      - "traefik.http.routers.pocketid.tls.certresolver=letsencrypt"
      - "traefik.http.routers.pocketid.middlewares=security-headers@file"
      - "traefik.http.services.pocketid.loadbalancer.server.port=1411"
    healthcheck:
      test: [ "CMD", "/app/pocket-id", "healthcheck" ]
      interval: 1m30s
      timeout: 5s
      retries: 2
      start_period: 10s
