http:
    middlewares:
        basic-auth:
            basicAuth:
                users:
                    - admin:$apr1$H6uskkkW$IgXLP6ewTrSuBkTrqE8wj/
    routers:
        1-base-router-auth:
            entryPoints:
                - websecure
            middlewares:
                - badger@http
            priority: 200
            rule: "Host(`example.com`)"
            service: "1-base-service@http"
            tls:
                certResolver: "letsencrypt"
        3-request-router-auth:
            entryPoints:
                - websecure
            middlewares:
                - badger@http
            priority: 200
            rule: "Host(`request.example.com`)"
            service: "3-request-service@http"
            tls:
                certResolver: "letsencrypt"
        5-port-router-auth:
            entryPoints:
                - websecure
            middlewares:
                - badger@http
            priority: 200
            rule: "Host(`hetzner.example.com`)"
            service: "5-port-service@file"
