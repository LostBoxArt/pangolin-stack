# Pangolin Stack - User Applications
# Requires: core stack (pangolin network)

name: pangolin-apps

networks:
  pangolin:
    external: true

services:
  landing:
    image: nginx:alpine
    container_name: landing
    networks:
      - pangolin
    restart: unless-stopped
    volumes:
      - /opt/homelab/sites/example-landing:/usr/share/nginx/html:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.linkstack.rule=Host(`example.com`)"
      - "traefik.http.routers.linkstack.entrypoints=websecure"
      - "traefik.http.routers.linkstack.tls.certresolver=letsencrypt"
      - "traefik.http.routers.linkstack.middlewares=geoblock@file,security-headers@file"
      - "traefik.http.services.linkstack.loadbalancer.server.port=80"

  termix:
    image: ghcr.io/lukegus/termix:latest
    container_name: termix
    networks:
      - pangolin
    restart: unless-stopped
    volumes:
      - termix_data:/app/data
    environment:
      - PORT=8080
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.termix.rule=Host(`termix.example.com`)"
      - "traefik.http.routers.termix.entrypoints=websecure"
      - "traefik.http.routers.termix.tls.certresolver=letsencrypt"
      - "traefik.http.routers.termix.middlewares=geoblock@file,security-headers@file"
      - "traefik.http.services.termix.loadbalancer.server.port=8080"

volumes:
  termix_data:
    driver: local
