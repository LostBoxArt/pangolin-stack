# Pangolin Stack - Optional Add-ons
# Usage: docker compose -f docker-compose.yml -f docker-compose.addons.yml up -d

services:
  olm:
    image: ghcr.io/fosrl/olm:1.3.0
    container_name: olm
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    command:
      - "--id"
      - "zeo3s979u4jif3x"
      - "--secret"
      - "ax4okcnq7e6k6p1d2pxl7lhk7ajprkog3zfabac9anjst6ds"
      - "--endpoint"
      - "https://pangolin.dennisb.xyz"

  middleware-manager:
    container_name: middleware-manager
    image: hhftechnology/middleware-manager:latest
    restart: unless-stopped
    depends_on:
      pangolin:
        condition: service_healthy
    ports:
      - "3456:3456"
    group_add:
      - "986"  # docker group
    environment:
      - PANGOLIN_API_URL=http://pangolin:3001/api/v1
      - TRAEFIK_API_URL=http://gerbil:8080
      - TRAEFIK_CONF_DIR=/conf
      - TRAEFIK_STATIC_CONFIG_PATH=/etc/traefik/traefik_config.yml
      - DB_PATH=/data/middleware.db
      - PORT=3456
    volumes:
      - ./data:/data
      - ./config/traefik/rules:/conf
      - ./config/traefik:/etc/traefik
      - ./config/middleware-manager/templates.yaml:/app/config/templates.yaml
      - ./config/middleware-manager/config.json:/app/config/config.json

  traefik-agent:
    container_name: traefik-agent
    image: hhftechnology/traefik-log-dashboard-agent:latest
    restart: unless-stopped
    ports:
      - "5000:5000"
    group_add:
      - "986"  # docker group
    environment:
      - TRAEFIK_LOG_DASHBOARD_ACCESS_PATH=/logs/access.log
      - TRAEFIK_LOG_DASHBOARD_ERROR_PATH=/logs/traefik.log
      - TRAEFIK_LOG_DASHBOARD_AUTH_TOKEN=${TRAEFIK_DASHBOARD_TOKEN}
      - TRAEFIK_LOG_DASHBOARD_SYSTEM_MONITORING=true
      - TRAEFIK_LOG_DASHBOARD_GEOIP_ENABLED=true
      - TRAEFIK_LOG_DASHBOARD_GEOIP_CITY_DB=/geoip/GeoLite2-City.mmdb
      - TRAEFIK_LOG_DASHBOARD_GEOIP_COUNTRY_DB=/geoip/GeoLite2-Country.mmdb
      - TRAEFIK_LOG_DASHBOARD_LOG_FORMAT=json
      - PORT=5000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/logs/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - ./data/positions:/data
      - ./config/traefik/logs:/logs:ro
      - ./config/maxmind:/geoip:ro

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    ports:
      - 3000:3000
    volumes:
      - ./config/homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    group_add:
      - "986"  # docker group
    environment:
      - TZ=Asia/Jerusalem
      - HOMEPAGE_ALLOWED_HOSTS=home.dennisb.xyz
    extra_hosts:
      - "sonarr.dennisb.xyz:192.168.0.10"
      - "radarr.dennisb.xyz:192.168.0.10"
      - "request.dennisb.xyz:192.168.0.10"
      - "bazarr.dennisb.xyz:192.168.0.10"
      - "prowlarr.dennisb.xyz:192.168.0.10"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homepage.rule=Host(`home.dennisb.xyz`)"
      - "traefik.http.routers.homepage.entrypoints=websecure"
      - "traefik.http.routers.homepage.tls.certresolver=letsencrypt"
      - "traefik.http.services.homepage.loadbalancer.server.port=3000"

  dashdot:
    image: mauricenino/dashdot:latest
    container_name: dashdot
    restart: unless-stopped
    ports:
      - 3001:3001
    group_add:
      - "986"  # docker group
    environment:
      - DASHDOT_WIDGET_LIST=os,cpu,storage,ram,network
    volumes:
      - /:/mnt/host:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashdot.rule=Host(`dash.dennisb.xyz`)"
      - "traefik.http.routers.dashdot.entrypoints=websecure"
      - "traefik.http.routers.dashdot.tls.certresolver=letsencrypt"
      - "traefik.http.services.dashdot.loadbalancer.server.port=3001"

  linkstack:
    image: linkstackorg/linkstack:latest
    container_name: linkstack
    restart: unless-stopped
    group_add:
      - "986"  # docker group
    environment:
      - HTTP_SERVER_NAME=dennisb.xyz
      - HTTPS_SERVER_NAME=dennisb.xyz
      - LOG_LEVEL=info
      - PHP_MEMORY_LIMIT=256M
      - UPLOAD_MAX_FILESIZE=8M
      - TZ=Asia/Jerusalem
      - SERVER_ADMIN=admin@dennisb.xyz
    volumes:
      - linkstack_data:/htdocs
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.linkstack.rule=Host(`dennisb.xyz`)"
      - "traefik.http.routers.linkstack.entrypoints=websecure"
      - "traefik.http.routers.linkstack.tls.certresolver=letsencrypt"
      - "traefik.http.services.linkstack.loadbalancer.server.port=80"
      - "traefik.http.routers.linkstack-ip.rule=Host(`51.195.100.11`)"
      - "traefik.http.routers.linkstack-ip.entrypoints=websecure"
      - "traefik.http.routers.linkstack-ip.tls.certresolver=letsencrypt"

  traefik-dashboard:
    container_name: traefik-dashboard
    image: hhftechnology/traefik-log-dashboard:latest
    restart: unless-stopped
    depends_on:
      traefik-agent:
        condition: service_healthy
    ports:
      - "3457:3000"
    group_add:
      - "986"  # docker group
    environment:
      - AGENT_API_URL=http://traefik-agent:5000
      - AGENT_API_TOKEN=${TRAEFIK_DASHBOARD_TOKEN}
      - NODE_ENV=production
      - PORT=3000
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ./config/maxmind/GeoLite2-City.mmdb:/app/node_modules/geolite2-redist/dist/GeoLite2-City.mmdb:ro
      - ./config/maxmind/GeoLite2-Country.mmdb:/app/node_modules/geolite2-redist/dist/GeoLite2-Country.mmdb:ro

volumes:
  linkstack_data:
    external: true
    name: linkstack_linkstack_data


