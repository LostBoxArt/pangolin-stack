# Pangolin Stack - DNS Services
# Requires: core stack (pangolin network)

name: pangolin-dns

networks:
  pangolin:
    external: true

services:
  adguard-home:
    image: adguard/adguardhome:latest
    container_name: adguard-home
    hostname: adguard-home
    networks:
      - pangolin
    restart: unless-stopped
    volumes:
      - ../../config/adguard-home/work:/opt/adguardhome/work
      - ../../config/adguard-home/conf:/opt/adguardhome/conf
    # No ports exposed - Traefik handles all traffic
    labels:
      # HTTP redirect to HTTPS
      - "traefik.enable=true"
      - "traefik.http.routers.adguard-redirect.rule=Host(`dns.dennisb.xyz`)"
      - "traefik.http.routers.adguard-redirect.entrypoints=web"
      - "traefik.http.routers.adguard-redirect.middlewares=redirect-to-https@file"
      
      # Main HTTPS router for web UI
      - "traefik.http.routers.adguard.rule=Host(`dns.dennisb.xyz`)"
      - "traefik.http.routers.adguard.entrypoints=websecure"
      - "traefik.http.routers.adguard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.adguard.middlewares=security-headers@file"
      - "traefik.http.services.adguard.loadbalancer.server.port=80"
      
      # DoH router - separate path for DNS queries (no extra middlewares)
      - "traefik.http.routers.adguard-doh.rule=Host(`dns.dennisb.xyz`) && PathPrefix(`/dns-query`)"
      - "traefik.http.routers.adguard-doh.entrypoints=websecure"
      - "traefik.http.routers.adguard-doh.tls.certresolver=letsencrypt"
      # No security-headers for DoH - could break DNS clients
      - "traefik.http.services.adguard-doh.loadbalancer.server.port=80"

      # DoT router - TCP for DNS-over-TLS on port 853
      - "traefik.tcp.routers.adguard-dot.rule=HostSNI(`dns.dennisb.xyz`)"
      - "traefik.tcp.routers.adguard-dot.entrypoints=dns-tls"
      - "traefik.tcp.routers.adguard-dot.tls.certresolver=letsencrypt"
      - "traefik.tcp.services.adguard-dot.loadbalancer.server.port=53"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

