name: pangolin
networks:
  default:
    driver: bridge
    name: pangolin
services:
  crowdsec:
    command: -t
    container_name: crowdsec
    environment:
      ACQUIRE_FILES: /var/log/traefik/*.log
      COLLECTIONS: crowdsecurity/traefik crowdsecurity/appsec-virtual-patching crowdsecurity/appsec-generic-rules
      ENROLL_INSTANCE_NAME: pangolin-crowdsec
      ENROLL_TAGS: docker
      GID: "1000"
      PARSERS: crowdsecurity/whitelists
      CUSTOM_HOSTNAME: "crowdsec"
      DISABLE_ONLINE_API: "${DISABLE_ONLINE_API}"
      DISABLE_HUB_UPDATE: "${DISABLE_HUB_UPDATE}"
    hostname: crowdsec
    expose:
      - 6060
      - 8080
    healthcheck:
      test:
        - CMD
        - cscli
        - lapi
        - status
    image: crowdsecurity/crowdsec:latest
    labels:
      - traefik.enable=false

    ports:
      - 6060:6060
      - 8080:8080
    restart: unless-stopped
    volumes:
      - ./config/crowdsec:/etc/crowdsec
      - ./config/crowdsec/db:/var/lib/crowdsec/data
      - /var/log/auth.log:/var/log/auth.log:ro
      - /var/log/syslog:/var/log/syslog:ro
      - ./config/traefik/logs:/var/log/traefik
  crowdsec-web-ui:
    image: ghcr.io/theduffman85/crowdsec-web-ui:latest
    container_name: crowdsec-web-ui
    restart: unless-stopped
    ports:
      - "3458:3000"
    depends_on:
      crowdsec:
        condition: service_healthy
    environment:
      CROWDSEC_URL: http://crowdsec:8080
      CROWDSEC_USER: crowdsec-web-ui
      CROWDSEC_PASSWORD: ${CROWDSEC_WEB_UI_PASSWORD}
      DB_DIR: /app/config
    volumes:
      - ./config/crowdsec-web-ui:/app/config
  gerbil:
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    command:
      - --reachableAt=http://gerbil:3003
      - --generateAndSaveKeyTo=/var/config/key
      - --remoteConfig=http://pangolin:3001/api/v1/gerbil/get-config
      - --reportBandwidthTo=http://pangolin:3001/api/v1/gerbil/receive-bandwidth
    container_name: gerbil
    depends_on:
      pangolin:
        condition: service_healthy
    image: fosrl/gerbil:latest
    ports:
      - 51820:51820/udp
      - 21820:21820/udp
      - 443:443
      - 80:80
    restart: unless-stopped
    volumes:
      - ./config/:/var/config

  pangolin:
    container_name: pangolin
    healthcheck:
      interval: 3s
      retries: 5
      test:
        - CMD
        - curl
        - -f
        - http://localhost:3001/api/v1/
      timeout: 3s
    image: fosrl/pangolin:1.14.1
    restart: unless-stopped
    volumes:
      - ./config:/app/config

  traefik:
    command:
      - --configFile=/etc/traefik/traefik_config.yml
    container_name: traefik
    labels:
      - wud.watch=false
    depends_on:
      pangolin:
        condition: service_healthy
    image: traefik:latest
    network_mode: service:gerbil
    restart: unless-stopped
    volumes:
      - ./config/traefik:/etc/traefik:ro
      - ./config/letsencrypt:/letsencrypt
      - ./config/traefik/logs:/var/log/traefik
      - ./config/traefik/rules:/rules
      - /var/run/docker.sock:/var/run/docker.sock

  traefik-agent:
    image: hhftechnology/traefik-log-dashboard-agent:latest
    container_name: traefik-agent
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./data/positions:/data
      - ./config/traefik/logs:/logs:ro
    environment:
      - TRAEFIK_LOG_DASHBOARD_ACCESS_PATH=/logs/access.log
      - TRAEFIK_LOG_DASHBOARD_ERROR_PATH=/logs/traefik.log
      - TRAEFIK_LOG_DASHBOARD_AUTH_TOKEN=${TRAEFIK_DASHBOARD_TOKEN}
      - TRAEFIK_LOG_DASHBOARD_SYSTEM_MONITORING=true
      - TRAEFIK_LOG_DASHBOARD_LOG_FORMAT=json
      - PORT=5000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/logs/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
  traefik-dashboard:
    image: hhftechnology/traefik-log-dashboard:latest
    container_name: traefik-dashboard
    restart: unless-stopped
    ports:
      - "3457:3000"
    environment:
      - AGENT_API_URL=http://traefik-agent:5000
      - AGENT_API_TOKEN=${TRAEFIK_DASHBOARD_TOKEN}
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      traefik-agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e 'require(\"http\").get(\"http://localhost:3000\", (res) => process.exit(res.statusCode === 200 ? 0 : 1))'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
  pocket-id:
    image: ghcr.io/pocket-id/pocket-id:v2
    container_name: pocket-id
    restart: unless-stopped
    environment:
      - APP_URL=${POCKET_ID_APP_URL}
      - ENCRYPTION_KEY=${POCKET_ID_ENCRYPTION_KEY}
      - TRUST_PROXY=${POCKET_ID_TRUST_PROXY}
      - MAXMIND_LICENSE_KEY=${MAXMIND_LICENSE_KEY}
      - MAXMIND_ACCOUNT_ID=${MAXMIND_ACCOUNT_ID}
    volumes:
      - ./data:/app/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pocketid-redirect.rule=Host(`auth.example.com`)"
      - "traefik.http.routers.pocketid-redirect.entrypoints=web"
      - "traefik.http.routers.pocketid-redirect.middlewares=redirect-to-https@file"
      - "traefik.http.routers.pocketid.rule=Host(`auth.example.com`)"
      - "traefik.http.routers.pocketid.entrypoints=websecure"
      - "traefik.http.routers.pocketid.tls.certresolver=letsencrypt"
      - "traefik.http.routers.pocketid.middlewares=security-headers@file"
      - "traefik.http.services.pocketid.loadbalancer.server.port=1411"
    healthcheck:
      test: [ "CMD", "/app/pocket-id", "healthcheck" ]
      interval: 1m30s
      timeout: 5s
      retries: 2
      start_period: 10s
  portainer:
    image: portainer/portainer-ee:latest
    container_name: portainer
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    ports:
      - 9000:9000
      - 9443:9443
      - 8000:8000
    environment:
      - PORTAINER_LICENSE_KEY=${PORTAINER_LICENSE_KEY}

volumes:
  portainer_data:
    external: true
    name: portainer_data
